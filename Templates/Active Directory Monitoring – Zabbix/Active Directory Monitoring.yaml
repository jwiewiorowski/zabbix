          name: 'Directory Service Events'
          type: ZABBIX_ACTIVE
          key: 'eventlog[Directory Service,,"Warning|Error|Critical"]'
          value_type: LOG
          triggers:
            - uuid: 7010d269e99d419b8906dd9bacdaef8e
              expression: 'logseverity(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"])>1 and nodata(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],1800s)=0 and logeventid(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],,"467")=1'
              name: 'AD database corrupted on {HOST.NAME}'
              priority: AVERAGE
            - uuid: b8695c55f76440278441f6f7c15f19a4
              expression: 'logseverity(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"])>1 and nodata(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],1800s)=0 and logeventid(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],,"2042")=1'
              name: 'It has been too long since {HOST.NAME} replicated'
              priority: HIGH
              description: 'If a domain controller has not replicated with its partner for longer than a tombstone lifetime, it is possible that a lingering object problem exists on one or both domain controllers. The tombstone lifetime in an Active Directory forest determines how long a deleted object (called a "tombstone") is retained in Active Directory Domain Services (AD DS). The tombstone lifetime is determined by the value of the tombstoneLifetime attribute on the Directory Service object in the configuration directory partition.'
            - uuid: 042f6347d5864a61a5a0e9eb97e81988
              expression: 'logseverity(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"])=4 and nodata(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],1800s)=0 and logeventid(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],,"2095")=1'
              recovery_mode: NONE
              name: 'The USN rollback on {HOST.NAME}'
              priority: DISASTER
            - uuid: c3c0eedd48134c59a809144f1022ee3b
              expression: 'logseverity(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"])>1 and nodata(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],1800s)=0 and logeventid(/AD DS Monitoring/eventlog[Directory Service,,"Warning|Error|Critical"],,"2089")=1'
              name: 'This directory partition has not been backed up since at least the following number of days.'
              priority: WARNING
