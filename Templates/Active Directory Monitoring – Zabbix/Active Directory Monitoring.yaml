        - uuid: 3031c8a2c8d843c587506103afb40dbb
          name: 'Windows Time Computed Time Offset'
          key: 'perf_counter_en[\Windows Time Service\Computed Time Offset]'
          value_type: FLOAT
          description: 'The absolute time offset between the system clock and the chosen time source, as computed by the W32Time service in microseconds. When a new valid sample is available, the computed time is updated with the time offset indicated by the sample. This time is the actual time offset of the local clock. W32Time initiates clock correction by using this offset and updates the computed time in between samples with the remaining time offset that needs to be applied to the local clock. Clock accuracy can be tracked by using this performance counter with a low polling interval (for example, 256 seconds or less) and looking for the counter value to be smaller than the desired clock accuracy limit.'
          tags:
            - tag: Application
              value: 'AD DS Performance'
          triggers:
            - uuid: 64270c1771584049a3c09ae4a1080d59
              expression: 'min(/AD DS Monitoring/perf_counter_en[\Windows Time Service\Computed Time Offset],5m)>100000000'
              name: 'Time Offset from Source is > 1 minute on host {HOST.NAME}'
              priority: AVERAGE
