zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: 01548d1b601f4732b8b26c229305e5bf
      template: 'AD DS Monitoring'
      name: 'AD DS Monitoring'
      groups:
        - name: Templates
      items:
        - uuid: 695b6c3d15614060a8009d2e72730388
          name: 'ATQ Threads Max'
          type: CALCULATED
          key: ATQThreadsMax
          delay: 1d
          params: '4 * last(//wmi.get[root/cimv2,"Select NumberOfLogicalProcessors from Win32_ComputerSystem"])'
        - uuid: 24998ab7ab2a4fa98c82ba9c731287ff
          name: 'Baseline - DNS Total Query Received/sec'
          type: CALCULATED
          key: baseline.dns.query.rec
          delay: 1d
          params: '1.1*max(//perf_counter_en[\DNS\Total Query Received/sec],7d)'
        - uuid: 60c4b5921b384d0caf99da45cac10e50
          name: 'Baseline - DS Directory Searches/sec'
          type: CALCULATED
          key: baseline.ds.searches
          units: /sec
          params: '1.1*max(//perf_counter_en["\DirectoryServices(*)\DS Directory Searches/sec"],7d)'
        - uuid: 1dd8df151b644f03b8bb55cef7e56356
          name: 'Baseline - LDAP Client Sessions'
          type: CALCULATED
          key: baseline.ldap.client.session
          delay: 1d
          params: '1.1*max(//perf_counter_en[\NTDS\LDAP Client Sessions],7d)'
        - uuid: 510bed9780f54dbc94521c1afbd668b0
          name: 'Active Directory Web Services Events'
          type: ZABBIX_ACTIVE
          key: 'eventlog[Active Directory Web Services,,"Warning|Error",,,,skip]'
          delay: 10m
          value_type: LOG
          tags:
            - tag: Application
              value: 'AD DS Events'
          triggers:
            - uuid: 09121ac7fa8a4b64b8b6f45acdd64b4d
              expression: 'logseverity(/AD DS Monitoring/eventlog[Active Directory Web Services,,"Warning|Error",,,,skip])>1 and nodata(/AD DS Monitoring/eventlog[Active Directory Web Services,,"Warning|Error",,,,skip],1800s)=0'
              name: 'AD DS: AD Web Services Warning/Error Detected'
              priority: AVERAGE
        - uuid: 6e038f783e4b44dc81038d0e3c3c7baf
          name: 'DFS Replication Events'
          type: ZABBIX_ACTIVE
          key: 'eventlog[DFS Replication,,"Warning|Error",,,,skip]'
          delay: 10m
          value_type: LOG
          tags:
            - tag: Application
              value: 'AD DS Events'
          triggers:
            - uuid: bf64470533d0470895cdebd814a37dc2
              expression: 'logseverity(/AD DS Monitoring/eventlog[DFS Replication,,"Warning|Error",,,,skip])>1 and nodata(/AD DS Monitoring/eventlog[DFS Replication,,"Warning|Error",,,,skip],86400s)=0'
              name: 'AD DS: DFS Replication Error Detected'
              priority: AVERAGE
              manual_close: 'YES'
        - uuid: 3bc63708ad4340b08d7d50f3d7af7129
          name: 'Directory Service Events'
          type: ZABBIX_ACTIVE
          key: 'eventlog[Directory Service,,"Warning|Error",,,,skip]'
